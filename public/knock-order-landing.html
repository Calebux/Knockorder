<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1440" />
  <title>Knock Order – Land Page</title>
  <link href="https://fonts.googleapis.com/css2?family=Ruda:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 1440px;
      height: 823px;
      overflow: hidden;
      font-family: 'Ruda', sans-serif;
      background: #0a0f1c;
    }

    /* ── ROOT ── */
    .land-page {
      position: relative;
      width: 1440px;
      height: 823px;
      background: #fff;
      overflow: hidden;
    }

    /* ── BACKGROUND ── */
    .bg-image {
      position: absolute;
      top: 0; left: 0;
      width: 1440px;
      height: 823px;
      object-fit: cover;
      pointer-events: none;
      z-index: 0;
    }

    /* ── LOGO ── */
    .logo-wrap {
      position: absolute;
      left: 50%;
      top: -13px;
      transform: translateX(-50%);
      width: 350px;
      height: 200px;
      z-index: 10;
      overflow: hidden;
    }
    .logo-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    /* ── ENTER THE ORDER banner ── */
    .enter-banner {
      position: absolute;
      left: 50%;
      top: 181px;
      transform: translateX(-50%);
      width: 400px;
      height: 122px;
      z-index: 10;
      overflow: hidden;
    }
    .enter-banner img {
      position: absolute;
      width: 103.14%;
      height: 192.7%;
      left: -3.11%;
      top: -43.26%;
    }
    .enter-label {
      position: absolute;
      left: 619px;
      top: 228px;
      font-size: 24px;
      font-weight: 800;
      color: #f2d7b5;
      white-space: nowrap;
      z-index: 20;
      letter-spacing: 1px;
    }

    /* ── LEFT NAV ── */
    .left-tab {
      position: absolute;
      left: -8px;
      top: 218px;
      width: 22.5px;
      height: 305px;
      z-index: 10;
    }
    .left-tab img { width: 100%; height: 100%; }

    .nav-btn {
      position: absolute;
      display: flex;
      align-items: center;
      gap: 6px;
      height: 40px;
      width: 174px;
      padding: 0 9px;
      z-index: 15;
      cursor: pointer;
      text-decoration: none;
    }
    .nav-btn .btn-bg {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: fill;
    }
    .nav-btn .btn-icon {
      position: relative;
      z-index: 1;
      width: 20px; height: 20px;
      flex-shrink: 0;
      object-fit: contain;
    }
    .nav-btn .btn-label {
      position: relative;
      z-index: 1;
      font-size: 16px;
      font-weight: 500;
      white-space: nowrap;
    }

    /* CREATE MATCH – white text */
    .btn-create { left: 37px; top: 259px; }
    .btn-create .btn-label { color: #fff; }

    /* others – light blue text */
    .btn-join      { left: 37px; top: 307px; }
    .btn-story     { left: 37px; top: 355px; }
    .btn-community { left: 37px; top: 403px; }
    .btn-join .btn-label,
    .btn-story .btn-label,
    .btn-community .btn-label { color: #b9e7f4; }

    /* ── RIGHT NEWS PANEL ── */
    .right-tab {
      position: absolute;
      right: 17px;
      top: 218px;
      width: 22.5px;
      height: 305px;
      z-index: 10;
      transform: rotate(180deg);
    }
    .right-tab img { width: 100%; height: 100%; }

    .scrollbar-track {
      position: absolute;
      left: 1375px; top: 225px;
      width: 5px; height: 373px;
      background: #1f2c44;
      border-radius: 4px;
      z-index: 10;
    }
    .scrollbar-thumb {
      position: absolute;
      left: 1375px; top: 225px;
      width: 5px; height: 82px;
      background: #60a5ce;
      border-radius: 4px;
      z-index: 11;
    }

    .news-panel {
      position: absolute;
      left: 1114px;
      top: 181px;
      width: 274px;
      z-index: 10;
    }

    /* News heading row */
    .news-heading-img {
      position: absolute;
      left: 1114px;
      top: 181px;
      width: 274px;
      height: 35px;
      z-index: 11;
    }
    .news-heading-img img { width: 100%; height: 100%; object-fit: fill; }
    .news-label {
      position: absolute;
      left: 1130px;
      top: 189px;
      font-size: 16px;
      font-weight: 500;
      color: #fff;
      z-index: 12;
    }

    /* News cards container */
    .news-cards-box {
      position: absolute;
      left: 1114px;
      top: 216px;
      width: 274px;
      height: 406px;
      z-index: 10;
      overflow: hidden;
    }
    .news-cards-box img {
      width: 100%; height: 100%;
      object-fit: fill;
    }

    /* Individual cards (on top of the group image) */
    .news-card-1 {
      position: absolute;
      left: 1130px;
      top: 232px;
      width: 237px;
      z-index: 15;
    }
    .news-card-2 {
      position: absolute;
      left: 1130px;
      top: 437px;
      width: 237px;
      z-index: 15;
    }

    .news-card img.card-img {
      width: 100%;
      aspect-ratio: 1440 / 803;
      object-fit: cover;
      border: 2px solid #60a5ce;
      display: block;
    }
    .news-card-2 img.card-img { aspect-ratio: 1408 / 768; border-color: #56a4cb; }

    .news-card .card-title {
      margin-top: 8px;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      line-height: 1.3;
    }

    /* Divider line between cards */
    .news-divider {
      position: absolute;
      left: 1129px;
      top: 419px;
      width: 238px;
      height: 2px;
      background: rgba(96,165,206,0.4);
      z-index: 16;
    }

    /* ── SOCIAL MEDIA BUTTON ── */
    .social-btn-bg {
      position: absolute;
      left: 40px;
      top: 707px;
      width: 171px;
      height: 37px;
      z-index: 10;
    }
    .social-btn-bg img { width: 100%; height: 100%; object-fit: fill; }
    .social-label {
      position: absolute;
      left: 64px;
      top: 716px;
      font-size: 16px;
      font-weight: 700;
      color: #b9e7f4;
      white-space: nowrap;
      z-index: 11;
    }

    /* ── SOCIAL MEDIA ICONS ROW ── */
    .social-icons-row {
      position: absolute;
      left: 40px;
      top: 744px;
      width: 379px;
      height: 52px;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .social-icons-row img {
      width: 379px; height: 52px;
      object-fit: fill;
      transform: scaleY(-1);
    }
  </style>
</head>
<body>
<div class="land-page">

  <!-- Background -->
  <img class="bg-image"
    src="https://www.figma.com/api/mcp/asset/8be8713a-c846-404b-87d7-f55e008bb9dc"
    alt="background" />

  <!-- Logo -->
  <div class="logo-wrap">
    <img src="https://www.figma.com/api/mcp/asset/33ef3dcf-f298-49e8-8ea8-4d005e8b75ed" alt="Knock Order Logo" />
  </div>
  <!-- Second logo layer -->
  <div class="logo-wrap" style="z-index:11;">
    <img src="https://www.figma.com/api/mcp/asset/33ef3dcf-f298-49e8-8ea8-4d005e8b75ed" alt="" />
  </div>

  <!-- "Enter the Order" banner -->
  <div class="enter-banner">
    <img src="https://www.figma.com/api/mcp/asset/ba0c1501-7180-4325-8187-45cfee761eb0" alt="" />
  </div>
  <span class="enter-label">ENTER THE ORDER</span>

  <!-- Left edge tab -->
  <div class="left-tab">
    <img src="https://www.figma.com/api/mcp/asset/45b3238d-e8d3-44d6-bf40-325564d8afa8" alt="" />
  </div>

  <!-- CREATE MATCH -->
  <a class="nav-btn btn-create" href="#">
    <img class="btn-bg" src="https://www.figma.com/api/mcp/asset/eaed3d07-5db4-4aa5-af75-6851f50fce11" alt="" />
    <img class="btn-icon" src="https://www.figma.com/api/mcp/asset/9f4aee9d-3b71-445f-8b61-ba6a0ea24b65" alt="" />
    <span class="btn-label">CREATE MATCH</span>
  </a>

  <!-- JOIN MATCH -->
  <a class="nav-btn btn-join" href="#">
    <img class="btn-bg" src="https://www.figma.com/api/mcp/asset/dd670df0-414d-4c33-b2ea-e7b22d9ad668" alt="" />
    <img class="btn-icon" src="https://www.figma.com/api/mcp/asset/04584118-8195-41d8-9f99-a4b23a3b2c47" alt="" />
    <span class="btn-label">JOIN MATCH</span>
  </a>

  <!-- STORY -->
  <a class="nav-btn btn-story" href="#">
    <img class="btn-bg" src="https://www.figma.com/api/mcp/asset/dd670df0-414d-4c33-b2ea-e7b22d9ad668" alt="" />
    <img class="btn-icon" src="https://www.figma.com/api/mcp/asset/a1f07e48-9fea-4a72-95bd-109328f21a90" alt="" />
    <span class="btn-label">STORY</span>
  </a>

  <!-- COMMUNITY -->
  <a class="nav-btn btn-community" href="#">
    <img class="btn-bg" src="https://www.figma.com/api/mcp/asset/dd670df0-414d-4c33-b2ea-e7b22d9ad668" alt="" />
    <img class="btn-icon" src="https://www.figma.com/api/mcp/asset/64927c15-eb85-43b3-a9a3-54e44664169b" alt="" />
    <span class="btn-label">COMMUNITY</span>
  </a>

  <!-- News heading background -->
  <div class="news-heading-img">
    <img src="https://www.figma.com/api/mcp/asset/935e9076-a5c3-4ae2-be56-4e67cad95581" alt="" />
  </div>
  <span class="news-label">News</span>

  <!-- News panel background group -->
  <div class="news-cards-box">
    <img src="https://www.figma.com/api/mcp/asset/935e9076-a5c3-4ae2-be56-4e67cad95581" alt="" />
  </div>

  <!-- News Card 1 -->
  <div class="news-card news-card-1">
    <img class="card-img"
      src="https://www.figma.com/api/mcp/asset/04d8ca8c-1cc3-4fac-b29f-3dff98dcc8ec"
      alt="Season 1: Order Ascension" />
    <div class="card-title">
      <p>SEASON 1: ORDER ASCENSION</p>
      <p>NOW LIVE!</p>
    </div>
  </div>

  <!-- Divider -->
  <div class="news-divider"></div>

  <!-- News Card 2 -->
  <div class="news-card news-card-2">
    <img class="card-img"
      src="https://www.figma.com/api/mcp/asset/8508603b-14e7-41f3-b149-a6efd308b6ed"
      alt="New Character Reveal" />
    <div class="card-title">NEW CHARACTER REVEAL: KAZUMA, THE BLAZING SWORD</div>
  </div>

  <!-- Right edge tab -->
  <div class="right-tab">
    <img src="https://www.figma.com/api/mcp/asset/ba7a6101-615a-46c2-add5-76896d4b807a" alt="" />
  </div>

  <!-- Scrollbar -->
  <div class="scrollbar-track"></div>
  <div class="scrollbar-thumb"></div>

  <!-- Social Media button -->
  <div class="social-btn-bg">
    <img src="https://www.figma.com/api/mcp/asset/346f3dfc-28d0-49ab-a415-c57d8fd7a38c" alt="" />
  </div>
  <span class="social-label">SOCIAL MEDIA</span>

  <!-- Social icons row -->
  <div class="social-icons-row">
    <img src="https://www.figma.com/api/mcp/asset/194544c7-b4b1-4d12-ac34-35b2390ecc67" alt="Social media icons" />
  </div>

</div>
</body>
</html>
